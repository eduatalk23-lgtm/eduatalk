name: Golden Dataset Eval

on:
  pull_request:
    branches: [main]
    paths:
      - 'lib/domains/record-analysis/llm/**'
      - 'lib/domains/record-analysis/pipeline/**'
      - 'lib/domains/record-analysis/eval/**'
      - 'scripts/eval-student-record.ts'

  workflow_dispatch:
    inputs:
      threshold:
        description: '통과 기준 (%)'
        required: false
        default: '70'
        type: string

concurrency:
  group: eval-golden-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  eval:
    name: Eval (50 samples)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run golden dataset eval
        id: eval
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '70' }}"
          npx tsx scripts/eval-student-record.ts --ci --threshold="$THRESHOLD" || true

          # eval-results.json이 생성되지 않으면 스크립트 자체 오류
          if [ ! -f eval-results.json ]; then
            echo '{"error":"eval script crashed before producing results"}' > eval-results.json
          fi

          # GitHub Actions output으로 주요 값 전달
          echo "pass_rate=$(jq -r '.passRate // 0' eval-results.json)" >> "$GITHUB_OUTPUT"
          echo "threshold=$(jq -r '.threshold // 70' eval-results.json)" >> "$GITHUB_OUTPUT"
          echo "threshold_met=$(jq -r '.thresholdMet // false' eval-results.json)" >> "$GITHUB_OUTPUT"
          echo "total=$(jq -r '.total // 0' eval-results.json)" >> "$GITHUB_OUTPUT"
          echo "passed=$(jq -r '.passed // 0' eval-results.json)" >> "$GITHUB_OUTPUT"
          echo "failed=$(jq -r '.failed // 0' eval-results.json)" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('eval-results.json', 'utf8');
            const r = JSON.parse(raw);

            const icon = r.error ? ':warning:' : r.thresholdMet ? ':white_check_mark:' : ':x:';
            const status = r.error ? 'Error' : r.thresholdMet ? 'PASS' : 'FAIL';

            let body = `## ${icon} Golden Dataset Eval — ${status}\n\n`;

            if (r.error) {
              body += `> ${r.error}\n`;
            } else {
              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| Pass rate | **${r.passRate}%** (${r.passed}/${r.total}) |\n`;
              body += `| Threshold | ${r.threshold}% |\n`;
              body += `| Failed | ${r.failed} |\n`;
              body += `| Errored | ${r.errored} |\n`;
              body += `| Model | \`${r.model}\` |\n`;
            }

            if (r.highlight) {
              body += `\n### Highlight Verification\n`;
              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| Pass rate | ${r.highlight.passRate}% |\n`;
              body += `| Avg similarity | ${r.highlight.avgSimilarity?.toFixed(2) ?? '-'} |\n`;
              body += `| Avg coverage | ${r.highlight.avgCoverage ?? '-'}% |\n`;
              body += `| Total highlights | ${r.highlight.total} |\n`;
            }

            if (r.failures && r.failures.length > 0) {
              body += `\n<details><summary>${r.failures.length}건 실패 상세</summary>\n\n`;
              for (const f of r.failures) {
                body += `#### \`${f.id}\`\n`;
                body += `> ${f.description}\n\n`;
                if (f.error) {
                  body += `- Error: ${f.error}\n`;
                } else {
                  body += `- Score: ${f.score ?? 'N/A'}\n`;
                  for (const reason of f.reasons) {
                    body += `- ${reason}\n`;
                  }
                }
                body += '\n';
              }
              body += `</details>\n`;
            }

            body += `\n---\n_Generated by [eval-golden-dataset](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow_`;

            // 기존 코멘트 업데이트 또는 새로 생성
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Golden Dataset Eval')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Step summary
        if: always()
        run: |
          echo "## Golden Dataset Eval" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pass rate**: ${{ steps.eval.outputs.pass_rate }}% (${{ steps.eval.outputs.passed }}/${{ steps.eval.outputs.total }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Threshold**: ${{ steps.eval.outputs.threshold }}%" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Result**: ${{ steps.eval.outputs.threshold_met == 'true' && 'PASS' || 'FAIL' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if below threshold
        if: steps.eval.outputs.threshold_met == 'false'
        run: |
          echo "::error::Pass rate ${{ steps.eval.outputs.pass_rate }}% is below threshold ${{ steps.eval.outputs.threshold }}%"
          exit 1
